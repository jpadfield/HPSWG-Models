name: Update READMEs from models

permissions:
  contents: write

on:
  push:
    paths:
      - 'models/*.tsv'                              # top-level NG model TSVs
      - 'models/**/*.tsv'                           # versioned model TSVs in subfolders
      - 'models/**/*.txt'                           # precursor files
      - 'scripts/update_readmes.py'                 # generator logic
      - 'scripts/check_consistency.py'              # consistency checker
      - 'scripts/ontologies.json'                   # ontology config
      - 'scripts/crm_hierarchy.json'                # CRM class hierarchy
      - 'README.template.md'                        # top-level template
      - 'models/README.template.md'                 # models index template
      - 'reports/README.template.md'                # reports index template
      - 'reports/*.md'                              # report content changes
      - '!reports/README.md'                        # exclude to prevent action loop
      - '.github/workflows/update-readmes.yml'      # workflow definition
  workflow_dispatch:


jobs:
  update-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0                            # full history required for git dates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Determine latest ng_models TSV and fetch Mermaid diagram
        run: |
          set -e
          cd models

          NG_FILES=$(ls ng_models_v*.tsv 2>/dev/null || true)
          if [ -z "$NG_FILES" ]; then
            echo "No ng_models_v*.tsv found, skipping Mermaid fetch."
            RAW_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF}"
            echo "RAW_BASE=$RAW_BASE" >> $GITHUB_ENV
            exit 0
          fi

          LATEST=$(printf "%s\n" $NG_FILES | sort -V | tail -n1)
          echo "Latest ng_models file: $LATEST"

          RAW_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_REF}"
          echo "RAW_BASE=$RAW_BASE" >> $GITHUB_ENV

          TSV_PATH="models/${LATEST}"
          RAW_URL="${RAW_BASE}/${TSV_PATH}"

          echo "Fetching Mermaid for ${RAW_URL}"
          curl -s "https://research.nationalgallery.org.uk/lab/modelling/?url=${RAW_URL}&getmermaid" \
            -o ng_models_mermaid.mmd || true

      - name: Run README generator
        env:
          RAW_BASE: ${{ env.RAW_BASE }}
        run: |
          python scripts/update_readmes.py

      - name: Run consistency checker
        run: |
          python scripts/check_consistency.py

      - name: Commit and push changes
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git status
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Auto-update READMEs and consistency report"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "${GITHUB_REF_NAME}"
          else
            echo "No changes to commit."
          fi
